name: Update Hourly Trends

on:
  schedule:
    - cron: "5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Generate latest hourly trends
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          MAX_HOURS: "24"
          MAX_ITEMS: "20"
        run: node ./scripts/update-hourly-trends.mjs

      - name: Commit and push updated data
        run: |
          if git diff --quiet -- data/hourly-trends.json; then
            echo "No data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/hourly-trends.json
          git commit -m "Update hourly hot search data"
          git push
